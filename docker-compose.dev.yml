services:
  app:
    build:
      context: ./client-web
      dockerfile: dev.Dockerfile
    container_name: app
    environment:
      VITE_BASE_API_URL: ${VITE_BASE_API_URL:-}
    expose:
      - "5173"
    volumes:
      - ./client-web/src:/usr/src/app/src
      - ./client-web/public:/usr/src/app/public
      - ./client-web/index.html:/usr/src/app/index.html
      - ./client-web/vite.config.ts:/usr/src/app/vite.config.ts
      - ./client-web/tsconfig.json:/usr/src/app/tsconfig.json
      - ./client-web/tsconfig.app.json:/usr/src/app/tsconfig.app.json
      - ./client-web/tsconfig.node.json:/usr/src/app/tsconfig.node.json

  db:
    build:
      dockerfile: server/build/dev/db.Dockerfile
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test
    expose:
      - "5432"
    command: ["postgres", "-c", "shared_preload_libraries=pg_cron", "-c", "cron.database_name=test"]
    volumes:
      - data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: build/dev/api.Dockerfile
    env_file:
      - ./server/.env
    container_name: api
    command: ["air", "-c", "air.toml"]
    volumes:
      - ./server:/app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  minio:
    image: quay.io/minio/aistor/minio:latest
    container_name: minio
    command: server --console-address ":9001" /data --license /minio.license
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
      - ./infra/minio/minio.license:/minio.license:ro
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  data:
  minio-data:
