services:
  app:
    build:
      context: ./client-web
      dockerfile: dev.Dockerfile
    container_name: app
    environment:
      VITE_BASE_API_URL: ${VITE_BASE_API_URL:-}
    expose:
      - "5173"
    volumes:
      - ./client-web/src:/usr/src/app/src
      - ./client-web/public:/usr/src/app/public
      - ./client-web/index.html:/usr/src/app/index.html
      - ./client-web/vite.config.ts:/usr/src/app/vite.config.ts
      - ./client-web/tsconfig.json:/usr/src/app/tsconfig.json
      - ./client-web/tsconfig.app.json:/usr/src/app/tsconfig.app.json
      - ./client-web/tsconfig.node.json:/usr/src/app/tsconfig.node.json

  db:
    build:
      dockerfile: server/build/dev/db.Dockerfile
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test
    expose:
      - "5432"
    command: ["postgres", "-c", "shared_preload_libraries=pg_cron", "-c", "cron.database_name=test"]
    volumes:
      - data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: build/dev/api.Dockerfile
    env_file:
      - ./server/.env
    container_name: api
    command: ["air", "-c", "air.toml"]
    volumes:
      - ./server:/app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://localhost:9000/health && curl -f http://localhost:9001/rustfs/console/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    environment:
      RUSTFS_EXTERNAL_ADDRESS: http://localhost:9000
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: true
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      # RUSTFS_CORS_ALLOWED_ORIGINS: "*"
      # RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - ./infra/rustfs/data:/data
      - ./infra/rustfs/logs:/logs

  # Manual repair helper for RustFS bind-mount permissions.
  # This service is hidden behind the "perms" profile, so normal `docker compose up`
  # will not run it. Use `just rustfs-perms` only if RustFS logs filesystem errors
  # such as "Permission denied", "EACCES", or "failed to write".
  rustfs_perms:
    image: alpine
    profiles:
      - perms
    user: root
    volumes:
      - ./infra/rustfs/logs:/logs
      - ./infra/rustfs/data:/data
    command: chown -R 10001:10001 /logs /data

volumes:
  data:
