version: "2"
sql:
  - engine: "postgresql"
    queries: "./sqlc/query.sql"
    schema: "./migrations/sql"
    gen:
      go:
        package: "db"
        out: "./internal/db"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
